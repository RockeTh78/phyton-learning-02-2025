project_name: "recipe-blog"
topic: "KI-Rezeptblog"
description: "Blog für selbst kreierte Rezepte mit KI-generierten Beschreibungen aus Fotos"
language: "de"  # primary language

features:
  - "Rezepte aus Fotos mit KI generieren (Zutaten, Anleitung, Tipps)"
  - "Mehrsprachig DE/EN/FR"
  - "Login-Schutz für Uploads"
  - "Affiliate-Links zu Kochutensilien (Amazon)"
  - "Mobiloptimiert"

style:
  primary_color: "#e63946"
  theme: "warm, appetizing, modern"
  font: "Georgia, serif"  # optional, override default font

deployment:
  platform: "railway"
  port: 8080
  github_user: "RockeTh78"   # GitHub username for repo creation
  # github_repo: ""           # optional: repo name (default: project_name)
  # railway_env_vars:         # optional: extra env vars to set in Railway
  #   GOOGLE_PLACES_API_KEY: "..."

domain:
  name: "my-recipe-blog.de"  # desired domain — agent checks availability + suggests alternatives
  # years: 1                 # registration period (default: 1)
  # skip: false              # set to true to skip domain registration entirely
